name: Deploy Frontend to GitHub Pages

on:
  push:
    branches: ["main"]
    # Tùy chọn: Chỉ chạy action này khi có thay đổi trong thư mục frontend
    paths:
      - 'frontend/**'

# Cấp quyền cho GitHub Actions được phép ghi đè lên trang Pages
permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies and Build
        working-directory: ./frontend
        run: |
          npm install
          npm run build

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Chỉ định đúng thư mục chứa code sau khi build (Vite sinh ra thư mục dist)
          path: './frontend/dist'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
